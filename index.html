<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Xone | Premium UI</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#0b0b0b">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">
    <div class="spinner"></div>
    <p>Xone</p>
  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-card glass">

    <div class="badge">XONE</div>

    <h1>Modern UI Experience</h1>

    <p>
      Clean interface inspired by Spotify & Apple design system.
    </p>

    <div class="buttons">
      <button onclick="toggleTheme()">Toggle Theme</button>
      <button onclick="toggleMusic()">Play Music</button>
    </div>

    <audio id="bgMusic" loop>
      <source src="asset/violin.mp3">
    </audio>

  </div>

  <div class="glass-card">

    <div class="profile">
      <div class="avatar"></div>
      <div>
        <h3>Xone Dev</h3>
        <p>UI Designer</p>
      </div>
    </div>

    <div class="status">
      <h2 id="counter">0</h2>
      <p>system running</p>
    </div>

  </div>

</section>

<!-- FEATURES -->
<section class="features">

  <div class="card glass">Clean Design</div>
  <div class="card glass">Smooth UI</div>
  <div class="card glass">Fast System</div>
  <div class="card glass">Modern Theme</div>

</section>

<!-- GALLERY -->
<section id="gallery" class="gallery">

  <h2>Gallery</h2>

  <div class="grid">
    <img src="asset/foto1.jpeg">
    <img src="asset/foto2.jpeg">
    <img src="asset/foto3.jpeg">
  </div>

</section>

<!-- EXTRA -->
<section class="extra">

  <div class="glass-card">
    <h2>About System</h2>
    <p>
      A premium UI system inspired by Apple and Spotify design language.
    </p>
  </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box glass">
    <span onclick="closeModal()" class="close">×</span>
    <h2>Contact</h2>
    <p>@hnfi_ehs</p>
  </div>
</div>

<!-- BOTTOM NAV (ONLY NAVIGATION) -->
<div class="bottom-nav glass">

  <button onclick="goHome()">Home</button>
  <button onclick="openGallery()">Gallery</button>
  <button onclick="openContact()">Contact</button>

</div>

<script src="script.js"></script>

</body>
</html>
